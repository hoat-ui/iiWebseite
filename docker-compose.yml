services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    command: >
      sh -c "printf 'server{listen 80;root /usr/share/nginx/html;index index.html;location /{try_files \$$uri \$$uri/ /index.html;}}' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    restart: unless-stopped
